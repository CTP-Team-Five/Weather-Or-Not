<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="55%" stop-color="#1e2d4a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Mountain silhouette -->
  <path d="M0 500 L180 360 L320 420 L460 300 L620 400 L800 270 L980 380 L1200 330 L1200 630 L0 630 Z" fill="#0a1628" opacity="0.72"/>

  <!-- Eyebrow -->
  <text x="100" y="230" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" letter-spacing="8" fill="#94a3b8">WEATHERORNOT</text>

  <!-- Headline -->
  <text x="100" y="330" font-family="Manrope, system-ui, sans-serif" font-size="116" font-weight="800" letter-spacing="-3" fill="#ffffff">Should you go?</text>

  <!-- Subhead -->
  <text x="100" y="395" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="400" fill="#cbd5e1">Surf, hike, snow. Pin a spot. Get a straight answer.</text>

  <!-- Verdict pill -->
  <g transform="translate(100 440)">
    <rect rx="40" ry="40" width="180" height="64" fill="#15803d"/>
    <text x="90" y="44" text-anchor="middle" font-family="Manrope, system-ui, sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="2">GO</text>
  </g>
  <g transform="translate(296 440)">
    <rect rx="40" ry="40" width="220" height="64" fill="#b45309"/>
    <text x="110" y="44" text-anchor="middle" font-family="Manrope, system-ui, sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="2">MAYBE</text>
  </g>
  <g transform="translate(532 440)">
    <rect rx="40" ry="40" width="200" height="64" fill="#991b1b"/>
    <text x="100" y="44" text-anchor="middle" font-family="Manrope, system-ui, sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="2">SKIP</text>
  </g>
</svg>
